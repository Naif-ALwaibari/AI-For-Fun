<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badehe AI — بديهي</title>
    <meta name="description" content="Badehe AI — The arrogant AI that thinks your questions are painfully obvious.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Marked.js for Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-deep: #070d1a;
            --bg-primary: #0a192f;
            --bg-secondary: #112240;
            --bg-tertiary: #1a2f4a;
            --cyan: #00e5ff;
            --cyan-soft: #00f0b5;
            --cyan-dim: rgba(0, 229, 255, 0.12);
            --cyan-glow: rgba(0, 229, 255, 0.4);
            --cyan-glow-strong: rgba(0, 229, 255, 0.55);
            --glass-bg: rgba(13, 32, 58, 0.55);
            --glass-border: rgba(0, 229, 255, 0.1);
            --glass-border-hover: rgba(0, 229, 255, 0.25);
            --text-primary: #ccd6f6;
            --text-bright: #e6f1ff;
            --text-muted: #4a6080;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'IBM Plex Sans', 'IBM Plex Sans Arabic', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Global custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 229, 255, 0.2);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 229, 255, 0.5);
        }

        /* ═══════════════════════════════════════════
           BACKGROUND
           ═══════════════════════════════════════════ */
        #cosmic-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: linear-gradient(160deg, var(--bg-deep) 0%, var(--bg-primary) 35%, var(--bg-secondary) 70%, #0d2b45 100%);
        }

        .nebula {
            position: absolute;
            border-radius: 50%;
            filter: blur(130px);
            animation: nebula-drift 28s ease-in-out infinite alternate;
        }

        .nebula-1 {
            width: 550px;
            height: 550px;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.12), transparent 70%);
            top: -12%;
            right: -8%;
            animation-duration: 30s;
        }

        .nebula-2 {
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(0, 240, 181, 0.08), transparent 70%);
            bottom: -10%;
            left: -8%;
            animation-duration: 26s;
            animation-delay: -6s;
        }

        .nebula-3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.06), transparent 70%);
            top: 45%;
            left: 55%;
            animation-duration: 22s;
            animation-delay: -12s;
        }

        @keyframes nebula-drift {
            0% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(35px, -25px) scale(1.08);
            }

            100% {
                transform: translate(-20px, 35px) scale(0.95);
            }
        }

        /* Subtle wave-line pattern */
        .wave-lines {
            position: absolute;
            inset: 0;
            background-image:
                repeating-linear-gradient(0deg,
                    transparent,
                    transparent 80px,
                    rgba(0, 229, 255, 0.018) 80px,
                    rgba(0, 229, 255, 0.018) 81px);
            pointer-events: none;
        }

        /* Grid overlay */
        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 229, 255, 0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.012) 1px, transparent 1px);
            background-size: 55px 55px;
        }

        /* Floating particles */
        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            animation: particle-float linear infinite;
        }

        @keyframes particle-float {
            0% {
                transform: translateY(100vh);
                opacity: 0;
            }

            8% {
                opacity: 0.8;
            }

            92% {
                opacity: 0.5;
            }

            100% {
                transform: translateY(-10vh);
                opacity: 0;
            }
        }

        /* ═══════════════════════════════════════════
           LANDING PAGE
           ═══════════════════════════════════════════ */
        #landing {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1.1s cubic-bezier(.4, 0, .2, 1), transform 1.1s cubic-bezier(.4, 0, .2, 1);
        }

        #landing.exit {
            opacity: 0;
            transform: scale(1.03) translateY(-15px);
            pointer-events: none;
        }

        .title-main {
            font-family: 'IBM Plex Sans', sans-serif;
            font-weight: 700;
            font-size: clamp(3rem, 8vw, 5.5rem);
            color: var(--cyan);
            letter-spacing: -0.03em;
            line-height: 1.05;
            animation: fade-up 0.7s ease both;
        }

        .arabic-subtitle {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            font-weight: 600;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            color: var(--cyan-soft);
            margin-top: 0.6rem;
            opacity: 0.65;
            animation: fade-up 0.7s ease 0.12s both;
        }

        .subtitle {
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: clamp(0.78rem, 1.6vw, 0.88rem);
            color: var(--text-muted);
            max-width: 420px;
            text-align: center;
            line-height: 1.6;
            margin-top: 0.6rem;
            animation: fade-up 0.7s ease 0.24s both;
        }

        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* CTA Button */
        .btn-start {
            position: relative;
            margin-top: 2.2rem;
            padding: 0.85rem 2.6rem;
            font-family: 'IBM Plex Sans', 'IBM Plex Sans Arabic', sans-serif;
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--bg-deep);
            border: none;
            cursor: pointer;
            border-radius: 8px;
            background: var(--cyan);
            box-shadow: 0 0 20px var(--cyan-glow), 0 0 50px rgba(0, 229, 255, 0.08);
            transition: all 0.35s cubic-bezier(.4, 0, .2, 1);
            overflow: hidden;
            animation: fade-up 0.7s ease 0.4s both, btn-cyan-pulse 3.5s ease-in-out 1.3s infinite;
            z-index: 1;
            letter-spacing: 0.01em;
        }

        .btn-start:hover {
            background: #00c8e0;
            box-shadow: 0 0 35px var(--cyan-glow-strong), 0 0 80px rgba(0, 229, 255, 0.2);
            transform: translateY(-2px);
        }

        .btn-start:active {
            transform: translateY(0) scale(0.97);
        }

        @keyframes btn-cyan-pulse {

            0%,
            100% {
                box-shadow: 0 0 20px var(--cyan-glow), 0 0 50px rgba(0, 229, 255, 0.08);
            }

            50% {
                box-shadow: 0 0 35px var(--cyan-glow-strong), 0 0 80px rgba(0, 229, 255, 0.18);
            }
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: scale(0);
            animation: ripple-out 0.6s ease-out;
            pointer-events: none;
        }

        @keyframes ripple-out {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* ═══════════════════════════════════════════
           CHAT INTERFACE
           ═══════════════════════════════════════════ */
        #chat-view {
            position: fixed;
            inset: 0;
            z-index: 5;
            display: flex;
            flex-direction: column;
            height: 100vh;
            min-height: 0;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.7s ease 0.55s;
        }

        #chat-view.active {
            opacity: 1;
            pointer-events: all;
        }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            background: transparent;
            z-index: 20;
            flex-shrink: 0;
        }

        .chat-header-title {
            font-family: 'IBM Plex Sans', 'IBM Plex Sans Arabic', sans-serif;
            font-weight: 600;
            font-size: 1.5rem;
            color: var(--cyan);
            opacity: 0.80;
            letter-spacing: 0.01em;
        }

        /* Messages */
        #messages {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 1rem 1.5rem 0.5rem;
            scroll-behavior: smooth;
        }

        .chat-fade-mask {
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
            mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
        }

        .messages-inner {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-content: flex-start;
            gap: 0.5rem;
            max-width: 768px;
            width: 100%;
            margin-left: auto;
            margin-right: auto;
            min-height: 100%;
        }

        #messages::-webkit-scrollbar {
            width: 4px;
        }

        #messages::-webkit-scrollbar-track {
            background: transparent;
        }

        #messages::-webkit-scrollbar-thumb {
            background: rgba(0, 229, 255, 0.12);
            border-radius: 10px;
        }

        #messages::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 229, 255, 0.25);
        }

        .message {
            max-width: 70%;
            animation: msg-appear 0.35s cubic-bezier(.4, 0, .2, 1) both;
            direction: rtl;
        }

        @keyframes msg-appear {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* User bubble — frosted cyan glass */
        .msg-user {
            align-self: flex-end;
            background: rgba(0, 229, 255, 0.08);
            border: 1px solid rgba(0, 229, 255, 0.15);
            backdrop-filter: blur(12px);
            color: var(--text-bright);
            padding: 0.55rem 0.9rem;
            border-radius: 12px 12px 4px 12px;
            font-size: 0.88rem;
            line-height: 1.5;
            font-family: 'IBM Plex Sans Arabic', 'IBM Plex Sans', sans-serif;
            transition: box-shadow 0.3s ease, border-color 0.3s ease;
            word-break: break-word;
            overflow-wrap: break-word;
            white-space: pre-wrap;
            overflow: hidden;
        }

        .msg-user:hover {
            border-color: rgba(0, 229, 255, 0.35);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.5), 0 0 30px rgba(0, 229, 255, 0.15);
        }

        /* Bot message — floating text */
        .msg-bot {
            align-self: flex-start;
            color: var(--text-primary);
            padding: 0.25rem 0.5rem;
            font-size: 0.88rem;
            line-height: 1.6;
            font-family: 'IBM Plex Sans Arabic', 'IBM Plex Sans', sans-serif;
            max-width: 76%;
            word-break: break-word;
            overflow-wrap: break-word;
            white-space: pre-wrap;
            overflow: hidden;
        }

        .msg-bot p {
            margin-bottom: 0.2em;
        }

        .msg-bot p:last-child {
            margin-bottom: 0;
        }

        .msg-bot strong {
            color: var(--cyan);
            font-weight: 600;
        }

        .msg-bot em {
            color: var(--cyan-soft);
            opacity: 0.8;
        }

        .msg-bot code {
            background: rgba(0, 229, 255, 0.06);
            border: 1px solid rgba(0, 229, 255, 0.1);
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 0.83em;
            color: var(--cyan);
        }

        .msg-bot pre {
            background: rgba(7, 13, 26, 0.9);
            border: 1px solid rgba(0, 229, 255, 0.08);
            border-radius: 6px;
            padding: 0.6rem;
            margin: 0.25em 0;
            overflow-x: auto;
            direction: ltr;
            text-align: left;
        }

        .msg-bot pre code {
            background: none;
            padding: 0;
            border: none;
            color: var(--text-primary);
        }

        .msg-bot ul,
        .msg-bot ol {
            padding-right: 1.2em;
            margin: 0.2em 0;
        }

        /* Streaming cursor */
        .streaming-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: var(--cyan);
            margin-right: 3px;
            vertical-align: text-bottom;
            animation: cursor-blink 0.6s steps(1) infinite;
        }

        @keyframes cursor-blink {

            0%,
            50% {
                opacity: 1;
            }

            51%,
            100% {
                opacity: 0;
            }
        }

        /* Input area */
        .input-area {
            padding: 0.6rem 1rem 1rem;
            background: transparent;
            flex-shrink: 0;
            z-index: 20;
            display: flex;
            justify-content: center;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            background: rgba(13, 32, 58, 0.7);
            border: 1px solid rgba(0, 229, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 0.35rem 0.45rem 0.35rem 0.8rem;
            transition: border-color 0.3s, box-shadow 0.3s;
            width: 100%;
            max-width: 768px;
        }

        .input-wrapper:focus-within {
            border-color: rgba(0, 229, 255, 0.3);
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.08);
        }

        .input-wrapper textarea {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text-bright);
            font-family: 'IBM Plex Sans Arabic', 'IBM Plex Sans', sans-serif;
            font-size: 0.85rem;
            direction: rtl;
            resize: none;
            overflow-y: auto;
            min-height: 22px;
            max-height: 128px;
            line-height: 1.5;
            padding: 3px 0;
        }

        .input-wrapper textarea::placeholder {
            color: var(--text-muted);
            opacity: 0.7;
        }

        .btn-send {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: var(--cyan);
            color: var(--bg-deep);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
            flex-shrink: 0;
        }

        .btn-send:hover {
            background: #00c8e0;
            box-shadow: 0 0 15px var(--cyan-glow);
            transform: scale(1.05);
        }

        .btn-send:active {
            transform: scale(0.93);
        }

        .btn-send:disabled {
            opacity: 0.2;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            background: var(--text-muted);
            color: var(--bg-secondary);
        }

        .btn-send svg {
            width: 17px;
            height: 17px;
            transform: scaleX(-1);
        }

        /* Thinking dots */
        .thinking-dots span {
            display: inline-block;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--cyan);
            margin: 0 2px;
            animation: thinking-bounce 1.2s ease-in-out infinite;
        }

        .thinking-dots span:nth-child(2) {
            animation-delay: 0.15s;
        }

        .thinking-dots span:nth-child(3) {
            animation-delay: 0.3s;
        }

        @keyframes thinking-bounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.2;
            }

            30% {
                transform: translateY(-5px);
                opacity: 1;
            }
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 0;
            margin: auto;
            opacity: 0.8;
            text-align: center;
            gap: 0.3rem;
        }

        .empty-state-icon {
            font-size: 2.2rem;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-6px);
            }
        }

        @media (max-width: 640px) {
            .message {
                max-width: 88%;
            }

            .msg-bot {
                max-width: 92%;
            }

            .input-wrapper {
                max-width: 100%;
            }
        }
    </style>
</head>

<body>

    <!-- ═══ Background ═══ -->
    <div id="cosmic-bg">
        <div class="nebula nebula-1"></div>
        <div class="nebula nebula-2"></div>
        <div class="nebula nebula-3"></div>
        <div class="wave-lines"></div>
        <div class="grid-overlay"></div>
    </div>

    <!-- ═══ Particles ═══ -->
    <div id="particles"></div>

    <!-- ═══ View 1: Landing ═══ -->
    <div id="landing">
        <h1 class="title-main">Badehe.AI</h1>
        <p class="arabic-subtitle">بديهي — الذكاء المتغطرس</p>

        <button class="btn-start" id="btn-start" onclick="startChat(event)">
            ابــــــدأ المحــــــادثة
        </button>
    </div>

    <!-- ═══ View 2: Chat ═══ -->
    <div id="chat-view">
        <div class="chat-header">
            <span class="chat-header-title">Badehe.AI</span>
        </div>

        <div id="messages" class="chat-fade-mask">
            <div class="messages-inner" id="messages-inner">
                <div class="empty-state" id="empty-state">
                    <div class="empty-state-icon">🧠</div>
                    <span
                        style="font-family:'IBM Plex Sans Arabic',sans-serif; font-size:1rem; color:var(--text-muted);">اسأل
                        سؤالك… إذا كنت تجرؤ</span>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="msg-input" placeholder="اكتب سؤالك هنا…" autocomplete="off" rows="1"
                    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
                <button class="btn-send" id="btn-send" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ═══ Particles ═══
        (function () {
            const c = document.getElementById('particles');
            const colors = ['rgba(0,229,255,0.3)', 'rgba(0,240,181,0.2)', 'rgba(0,229,255,0.12)'];
            for (let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.style.left = Math.random() * 100 + 'vw';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.animationDuration = (16 + Math.random() * 22) + 's';
                p.style.animationDelay = -(Math.random() * 25) + 's';
                const s = 1.5 + Math.random() * 2;
                p.style.width = p.style.height = s + 'px';
                c.appendChild(p);
            }
        })();

        // ═══ View Transition ═══
        function startChat(e) {
            const btn = document.getElementById('btn-start');
            const rip = document.createElement('span');
            rip.classList.add('ripple');
            const r = btn.getBoundingClientRect();
            rip.style.left = (e.clientX - r.left) + 'px';
            rip.style.top = (e.clientY - r.top) + 'px';
            rip.style.width = rip.style.height = Math.max(r.width, r.height) + 'px';
            btn.appendChild(rip);
            setTimeout(() => {
                document.getElementById('landing').classList.add('exit');
                setTimeout(() => {
                    document.getElementById('chat-view').classList.add('active');
                    document.getElementById('msg-input').focus();
                }, 550);
            }, 200);
        }

        // ═══ Textarea ═══
        function autoResize(el) {
            el.style.height = 'auto';
            const maxH = 128;
            if (el.scrollHeight > maxH) {
                el.style.height = maxH + 'px';
                el.style.overflowY = 'auto';
            } else {
                el.style.height = el.scrollHeight + 'px';
                el.style.overflowY = 'hidden';
            }
        }
        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        }

        // ═══ Markdown ═══
        marked.setOptions({ breaks: true, gfm: true });

        // ═══ Chat ═══
        let isStreaming = false;

        function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text || isStreaming) return;

            const es = document.getElementById('empty-state');
            if (es) es.remove();

            addMessage(text, 'user');
            input.value = '';
            input.style.height = 'auto';
            isStreaming = true;
            document.getElementById('btn-send').disabled = true;
            streamResponse(text);
        }

        function addMessage(content, type) {
            const container = document.getElementById('messages-inner');
            const div = document.createElement('div');
            div.classList.add('message', type === 'user' ? 'msg-user' : 'msg-bot');
            if (type === 'user') div.textContent = content;
            else div.innerHTML = content;
            container.appendChild(div);
            scrollToBottom();
            return div;
        }

        function scrollToBottom() {
            const c = document.getElementById('messages');
            requestAnimationFrame(() => { c.scrollTop = c.scrollHeight; });
        }

        async function streamResponse(message) {
            const thinkingDiv = document.createElement('div');
            thinkingDiv.classList.add('message', 'msg-bot');
            thinkingDiv.innerHTML = '<div class="thinking-dots"><span></span><span></span><span></span></div>';
            document.getElementById('messages-inner').appendChild(thinkingDiv);
            scrollToBottom();

            const botDiv = document.createElement('div');
            botDiv.classList.add('message', 'msg-bot');
            let rawText = '';
            let firstChunk = true;

            try {
                const res = await fetch(`/chat?message=${encodeURIComponent(message)}`);
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });

                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = line.slice(6);

                        if (data === '[DONE]') {
                            botDiv.innerHTML = marked.parse(rawText);
                            isStreaming = false;
                            document.getElementById('btn-send').disabled = false;
                            document.getElementById('msg-input').focus();
                            scrollToBottom();
                            return;
                        }

                        if (firstChunk) {
                            thinkingDiv.remove();
                            document.getElementById('messages-inner').appendChild(botDiv);
                            firstChunk = false;
                        }

                        try { rawText += JSON.parse(data); }
                        catch { rawText += data; }

                        botDiv.innerHTML = marked.parse(rawText) + '<span class="streaming-cursor"></span>';
                        scrollToBottom();
                    }
                }

                if (rawText) botDiv.innerHTML = marked.parse(rawText);
                if (firstChunk) thinkingDiv.remove();
            } catch (err) {
                thinkingDiv.remove();
                if (rawText) botDiv.innerHTML = marked.parse(rawText);
                else addMessage('⚠️ حدث خطأ في الاتصال', 'bot');
            }

            isStreaming = false;
            document.getElementById('btn-send').disabled = false;
            scrollToBottom();
        }
    </script>

</body>
